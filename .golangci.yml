# golangci-lint configuration for github.com/jasoet/pkg/v2
# Go utility library with focus on reliability, security, and performance

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    # Code quality
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - predeclared

    # Security
    - gosec

    # Performance
    - prealloc
    - unconvert

    # Style and maintainability
    - misspell
    - lll
    - goconst
    - gocyclo
    - revive

    # Bug prevention
    - bodyclose
    - noctx
    - rowserrcheck
    - sqlclosecheck

    # Additional useful linters
    - asciicheck
    - whitespace

  settings:
    gosec:
      severity: "medium"
      confidence: "medium"
      excludes:
        - G501
      includes:
        - G101
        - G102
        - G103
        - G104
        - G106
        - G107
        - G108
        - G109
        - G110

    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow

    gocyclo:
      min-complexity: 25

    goconst:
      min-len: 3
      min-occurrences: 3

    misspell:
      locale: US

    lll:
      line-length: 190

    staticcheck:
      checks: ["all"]

    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - io/ioutil.ReadFile
        - io.Copy(*bytes.Buffer)
        - io.Copy(os.Stdout)

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    revive:
      rules:
        - name: var-naming
          severity: warning
          disabled: false
          arguments:
            - ["ID", "URL", "HTTP", "JSON", "API", "SQL", "DB", "OTel", "GRPC", "SSH", "DSN"]
        - name: exported
          severity: warning
          disabled: false
          arguments:
            - "checkPrivateReceivers"
            - "sayRepetitiveInsteadOfStutters"

  exclusions:
    generated: lax
    presets:
      - comments
    paths:
      - vendor
      - examples
      - ".*\\.pb\\.go$"
    rules:
      - path: _test\.go
        linters:
          - gosec
          - goconst
          - lll
          - dupl
          - errcheck
          - gocyclo
          - unconvert
          - govet
          - staticcheck
          - noctx
      - text: "function min has same name as predeclared identifier"
        linters:
          - predeclared

formatters:
  enable:
    - gofmt
    - goimports
    - gofumpt
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/jasoet/pkg

severity:
  default: error
  rules:
    - linters:
        - revive
      severity: warning
    - linters:
        - gosec
      severity: error
