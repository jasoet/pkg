name: CI

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & Test
    if: >
      github.event_name == 'push' ||
      github.actor == 'jasoet'
    runs-on: [self-hosted, local, macOS, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint
        run: nix develop --command golangci-lint run ./...

      - name: Test
        run: nix develop --command go test -race -count=1 ./... -tags=!examples

      - name: API compatibility check
        # Breaking API changes are intended on `next` (v3 line) — informational there.
        if: github.ref_name != 'next'
        run: nix develop --command go run golang.org/x/exp/cmd/gorelease@latest

      - name: API compatibility report (informational on next)
        if: github.ref_name == 'next'
        continue-on-error: true
        run: nix develop --command go run golang.org/x/exp/cmd/gorelease@latest
